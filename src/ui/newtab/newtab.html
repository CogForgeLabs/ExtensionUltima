<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Tab</title>
    <style>
      :root { color-scheme: light dark; --accent: #4f46e5; }
      * { box-sizing: border-box; }
      body { font: 15px system-ui, sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; background: linear-gradient(160deg, #1e1b4b, #0f172a); color: #e5e7eb; }
      #clock { font-size: 64px; font-weight: 700; letter-spacing: 2px; }
      #date { opacity: .7; margin-top: -10px; }
      form { width: min(560px, 90vw); }
      #q { width: 100%; padding: 14px 16px; border-radius: 12px; border: 0; font-size: 16px; background: #ffffff14; color: inherit; }
      #q:focus { outline: 2px solid var(--accent); }
      .cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; width: min(560px, 90vw); }
      .card { flex: 1; min-width: 200px; background: #ffffff10; border-radius: 12px; padding: 14px; }
      .card h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; opacity: .6; margin: 0 0 8px; }
      .card a, .card .row { display: block; color: inherit; text-decoration: none; font-size: 13px; padding: 3px 0; opacity: .9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .card a:hover { opacity: 1; }
      #lock { width: min(560px, 90vw); display: flex; gap: 8px; }
      #lock input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 0; background: #ffffff14; color: inherit; }
      #lock button, .muted { font-size: 13px; }
      button { padding: 10px 14px; border-radius: 10px; border: 0; background: var(--accent); color: #fff; cursor: pointer; }
      .muted { opacity: .6; }
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <div>
      <div id="clock">--:--</div>
      <div id="date"></div>
    </div>
    <form id="search"><input id="q" type="text" placeholder="Search the web…" autocomplete="off" autofocus /></form>

    <div id="lock" hidden>
      <input id="pass" type="password" placeholder="Unlock ExtensionUltima…" />
      <button id="unlock">Unlock</button>
    </div>

    <div class="cards" id="cards" hidden>
      <div class="card"><h2>Today</h2><div id="time" class="row">—</div></div>
      <div class="card"><h2>Bookmarks</h2><div id="bookmarks"></div></div>
    </div>

    <script src="newtab.js"></script>
  </body>
</html>
