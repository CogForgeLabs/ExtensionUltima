<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ExtensionUltima</title>
    <style>
      :root { color-scheme: light dark; --accent: #4f46e5; --line: #8883; }
      * { box-sizing: border-box; }
      body { font: 13px/1.4 system-ui, sans-serif; width: 340px; margin: 0; padding: 12px; }
      h1 { font-size: 14px; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
      h1 .spacer { flex: 1; }
      h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; opacity: .55; margin: 12px 0 5px; }
      input, button, select { font: inherit; padding: 7px 9px; border-radius: 7px; border: 1px solid var(--line); background: transparent; color: inherit; }
      input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
      button { cursor: pointer; border: 0; }
      .primary { background: var(--accent); color: #fff; }
      .primary:hover { filter: brightness(1.1); }
      .ghost { background: transparent; border: 1px solid var(--line); color: inherit; }
      .row { display: flex; gap: 8px; align-items: center; }
      #search { width: 100%; margin-bottom: 4px; }
      ul { list-style: none; padding: 0; margin: 0; }
      .item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; cursor: pointer; }
      .item:hover, .item.sel { background: #80808022; }
      .item .ico { font-size: 18px; width: 22px; text-align: center; }
      .item .meta { flex: 1; min-width: 0; }
      .item .meta .name { font-weight: 600; }
      .item .meta .desc { opacity: .6; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pin { background: transparent; padding: 4px 6px; opacity: .5; }
      .pin.on, .pin:hover { opacity: 1; }
      .err { color: #dc2626; min-height: 1em; margin: 8px 0 0; }
      .muted { opacity: .6; }
      label { display: block; margin: 8px 0 3px; font-size: 12px; }
      fieldset { border: 1px solid var(--line); border-radius: 8px; margin: 8px 0; padding: 8px 10px; }
      legend { font-size: 11px; opacity: .7; padding: 0 4px; }
      .check { display: flex; align-items: center; gap: 6px; margin: 5px 0; }
      .check input { width: auto; }
      .jobs li { display: flex; gap: 8px; align-items: center; border: 1px solid var(--line); border-radius: 7px; padding: 6px 8px; margin-bottom: 6px; }
      .jobs .label { flex: 1; font-size: 12px; }
      .badge { background: var(--accent); color: #fff; border-radius: 10px; padding: 0 6px; font-size: 10px; font-weight: 700; margin-left: 6px; }
      .badge.paused { background: #9ca3af; }
      .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; display: inline-block; margin-left: 6px; }

      .running { border: 1px solid var(--accent); border-radius: 8px; padding: 8px; margin-bottom: 10px; background: #4f46e510; }
      .running .rhead { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
      .running .rhead h2 { margin: 0; flex: 1; color: var(--accent); }
      .abar { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
      .abar input { flex: 1; padding: 5px 7px; }
      .seg { display: flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
      .seg button { background: transparent; padding: 4px 8px; font-size: 11px; border-radius: 0; }
      .seg button.on { background: var(--accent); color: #fff; }
      .groups { max-height: 280px; overflow: auto; }
      details.group { border: 1px solid var(--line); border-radius: 7px; margin-bottom: 6px; padding: 0 6px; }
      details.group > summary { cursor: pointer; font-size: 12px; font-weight: 600; padding: 6px 2px; display: flex; align-items: center; gap: 6px; list-style: none; }
      details.group > summary::-webkit-details-marker { display: none; }
      details.group > summary .gcount { opacity: .55; font-weight: 400; }
      details.group > summary .gstop { margin-left: auto; }
      .jobrow { display: flex; align-items: center; gap: 8px; padding: 5px 2px; border-top: 1px solid var(--line); }
      .jobrow .jlabel { flex: 1; min-width: 0; }
      .jobrow .jmain { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .jobrow .jsub { font-size: 10px; opacity: .55; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .jobrow .next { font-size: 11px; opacity: .6; width: 52px; text-align: right; flex: none; }
      .iconbtn { background: transparent; padding: 3px 6px; font-size: 12px; }
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <h1>
      <span>ExtensionUltima</span>
      <span class="spacer"></span>
      <button id="permsBtn" class="ghost" hidden title="Security & permissions">🛡️</button>
      <button id="lockBtn" class="ghost" hidden>Lock</button>
    </h1>

    <!-- Lock screen -->
    <div id="lockedView">
      <div id="status" class="muted"></div>
      <input id="pass" type="password" placeholder="Master passphrase" autocomplete="current-password" style="width:100%;margin:8px 0" />
      <button id="unlockBtn" class="primary" style="width:100%">Unlock</button>
    </div>

    <!-- Launcher -->
    <div id="launcherView" hidden>
      <div id="running"></div>
      <input id="search" type="search" placeholder="Search extensions…" autocomplete="off" />
      <div id="list"></div>
    </div>

    <!-- Module panel -->
    <div id="panelView" hidden>
      <div class="row" style="margin-bottom:8px">
        <button id="backBtn" class="ghost">‹ Back</button>
        <strong id="panelTitle"></strong>
      </div>
      <div id="panelRoot"></div>
    </div>

    <p id="error" class="err"></p>
    <script src="popup.js"></script>
  </body>
</html>
